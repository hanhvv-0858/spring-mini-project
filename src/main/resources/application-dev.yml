# ============================================================
#  application-dev.yml — Profile DEV (H2 in-memory)
#  Dùng khi: không có MySQL, muốn test nhanh
#  Kích hoạt: đổi application.yml → profiles.active: dev
# ============================================================

spring:
  # ── H2 In-Memory ──────────────────────────────────────────
  datasource:
    url: jdbc:h2:mem:employeedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  # ── JPA ───────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: create-drop     # Tạo lại DB mỗi lần restart
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # ── Seed data luôn chạy với H2 (DB reset mỗi lần restart) ─
  seed-data:
    enabled: true

# ── Logging: DEV — hiện DEBUG ─────────────────────────────
logging:
  level:
    com.example.employeemanagement: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{HH:mm:ss} [%highlight(%-5level)] %cyan(%logger{36}) - %msg%n"

# JWT
jwt:
  secret: mySecretKey404E635266556A586E3272357538782F413F4428472B4B6250645367566B59
