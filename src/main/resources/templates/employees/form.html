<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Form Nhân Viên</title>
    <th:block th:replace="~{fragments/layout :: title}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <h1 class="page-title" th:text="${pageTitle}">Form Nhân Viên</h1>

    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <div class="card">
        <form th:action="${isEdit} ? @{/employees/edit/{id}(id=${employeeId})} : @{/employees/add}"
              th:object="${employeeRequest}"
              method="post">

            <div class="form-group">
                <label>Họ Tên *</label>
                <input type="text" th:field="*{name}"
                       class="form-control" placeholder="Nhập họ tên nhân viên"/>
                <div class="field-error" th:errors="*{name}"></div>
            </div>

            <div class="form-group">
                <label>Email *</label>
                <input type="email" th:field="*{email}"
                       class="form-control" placeholder="example@company.com"/>
                <div class="field-error" th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label>Chức Vụ</label>
                <input type="text" th:field="*{position}"
                       class="form-control" placeholder="Backend Developer..."/>
                <div class="field-error" th:errors="*{position}"></div>
            </div>

            <div class="form-group">
                <label>Lương (VNĐ)</label>
                <input type="number" th:field="*{salary}"
                       class="form-control" placeholder="25000000" min="0"/>
                <div class="field-error" th:errors="*{salary}"></div>
            </div>

            <div class="form-group">
                <label>Phòng Ban *</label>
                <select th:field="*{departmentId}" class="form-control">
                    <option value="">-- Chọn phòng ban --</option>
                    <option th:each="dept : ${departments}"
                            th:value="${dept.id}"
                            th:text="${dept.name}"></option>
                </select>
                <div class="field-error" th:errors="*{departmentId}"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary"
                        th:text="${isEdit} ? 'Cập Nhật' : 'Thêm Mới'">Submit</button>
                <a th:href="@{/employees/list}" class="btn btn-secondary">Hủy</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
