spring:
  application:
    name: employee-management

  # ── Active Profile ─────────────────────────────────────────────
  # dev  → H2 in-memory (không cần cài MySQL, dùng để test nhanh)
  # prod → MySQL thật (Module 7+)
  profiles:
    active: prod

  # ── Thymeleaf (dùng chung cả 2 profile) ───────────────────────
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

  # ── JPA chung ─────────────────────────────────────────────────
  jpa:
    show-sql: false          # Tắt ở base, bật lại theo profile nếu cần
    open-in-view: false      # tắt OSIV tránh lazy loading ngoài transaction
  # ── Cache chung (dùng cả 2 profile) ───────────────────────────────
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=60s   # Cache sống 60 giây

# ── Server ────────────────────────────────────────────────────
server:
  port: 8080

# ── Actuator ───────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# ── App Info hiện trong /actuator/info ────────────────────
info:
  app:
    name: Employee Management System
    version: 1.0.0-Module8
    description: Spring Boot Learning Project
    modules-completed: 8